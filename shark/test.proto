syntax = "proto3";

package test;

enum Color {
  RED = 0;
  GREEN = 1;
  BLUE = 2;
}

message Person {
  string name = 1;
  int32 age = 2;
  repeated string emails = 3;
  map<string, int32> scores = 4;
  Color favorite_color = 5;
  message Address {
    string street = 1;
    int32 number = 2;
  }
  Address address = 6;
}
