syntax = "proto2";

package shark.idl;

import "google/protobuf/descriptor.proto";

option (shark.idl.shark_file) = {
  runtime_namespace: "shark::rt"
  sk_stand: CXX_17
};

option cc_enable_arenas = true;

// Underlying integer width used by generated runtime enum.
enum EnumUnderlyingType {
  ENUM_UNDERLYING_UNSPECIFIED = 0;
  ENUM_UNDERLYING_U8 = 1;
  ENUM_UNDERLYING_U16 = 2;
  ENUM_UNDERLYING_U32 = 3;
}

// Strategy to provide enum-to-string conversion in generated code.
enum EnumStringSource {
  ENUM_STRING_SOURCE_UNSPECIFIED = 0;
  ENUM_STRING_SOURCE_PROTO_REFLECTION = 1;  // Use protobuf descriptors/name table.
  ENUM_STRING_SOURCE_CUSTOM_TABLE = 2;      // Use generated/custom static table.
}

enum CppStand {
  CXX_UNSPECIFIED = 0;
  CXX_17 = 1;
  CXX_20 = 2;
  CXX_23 = 3;
}
enum SharkEdition {
  EDITION_UNSPECIFIED = 0;
  SK_EDITION = 2026;
}

enum SharkFormat {
  /// Pure compact binary message format.
  /// Only supports primitive types, string, enum, and fixed-size numeric types.
  /// No indirect pointers, no nested expansion, ideal for RocksDB key generation.
  SKB_PURE = 0;

  /// Fully flattened single-block memory layout.
  /// Recursively unfolds all nested structures into continuous linear memory.
  /// Suitable for zero-copy access and mmap direct mapping.
  SKB_FLAT = 1;

  /// Columnar flattened storage format.
  /// Groups fields with identical name into independent contiguous columns.
  /// Optimized for CPU cache locality and random field access performance.
  SKB_COLUMN = 3;
}

// File-level generation controls for shark runtime output.
message SharkFileOptions {
  optional string                   runtime_namespace = 1;
  repeated string                   cpp_includes = 2;
  optional string                   sk_map_type = 3 [default = "std::unordered_map<%s, %s>"];
  optional string                   sk_vector = 4 [default = "std::vector<%s>"];
  optional CppStand                 sk_stand = 5 [default = CXX_17];
  optional SharkEdition             edition = 6 [default = SK_EDITION];

  // Suppresses sk.{cc,h} file output completely.
  optional bool no_generate = 10 [default = false];

  // For oneof fields, set ProtobufCFieldDescriptor name field to the
  // name of the containing oneof, instead of the field name
  optional bool use_oneof_field_name = 14 [default = false];

  // Overrides the package name, if present
  optional string c_package = 15;
}

// Enum-definition level controls.
message SharkEnumOptions {
  optional EnumUnderlyingType underlying_type = 1 [default = ENUM_UNDERLYING_UNSPECIFIED];
  optional bool bit_flags = 4;               // Generate bitwise operators: | & ~ ^.
}

// Message-level controls for owned/view runtime generation.
message SharkMessageOptions {
  /// Generate a virtual destructor for the message class
  optional bool virtual_dtor = 1;

  /// Make the message constructor private
  optional bool private_ctor = 2;

  /// Mark this message type as a singleton/instance
  optional bool is_instance = 3;

  /// Serialization format for the message (SKB_PURE/SKB_FLAT/SKB_COLUMN)
  /// Priority order:
  /// 1. User command-line input parameters (highest)
  /// 2. skb_format defined on the ROOT message
  /// 3. skb_format on nested child messages (IGNORED)
  optional SharkFormat skb_format = 4;
}

// Per-field customization options for runtime code generation.
message SharkFieldOptions {
  /// Override C++ type for this field (custom type mapping)
  optional string            ctype = 1;

  /// Generate atomic type for this field
  optional bool              is_atomic = 2;

  /// repeated field attribute
  optional bool              is_required = 3;

  /// Treat string field as raw byte sequence in generated code
  /// Disables string-specific logic and treats data as pure bytes
  optional bool string_as_bytes = 11 [default = false];
}

message SharkEnumValueOptions {
  optional string sk_enum_name = 1;
}

extend google.protobuf.FileOptions {
  optional SharkFileOptions shark_file = 52001;
}

extend google.protobuf.MessageOptions {
  optional SharkMessageOptions shark_message = 52002;
}

extend google.protobuf.EnumOptions {
  optional SharkEnumOptions shark_enum = 52004;
}
extend google.protobuf.EnumValueOptions {
  optional SharkEnumValueOptions sk_enum_value = 52005;
}

extend google.protobuf.FieldOptions {
  optional SharkFieldOptions shark_field = 52006;
}
