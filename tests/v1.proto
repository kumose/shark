syntax="proto2";
// for testing adding same named services in different packages into server
package v1.pb;

import "shark/shark.proto";

option cc_generic_services = true;

option (shark.km_file) = {
    c_include:["turbo/base/macros.h","turbo/utility/status.h"]
};

message EchoRequest {
    required string message = 1 [(shark.km_field) = {
        default_string: "EchoRequestmsg",
        crepeat: REP_DEQUE
    }];
    required int64 cnt = 2;
    required int64 total = 3 [(shark.km_field) = {
            protected_mutex: true,
            default_int64: 20,
            ctype: CINT8
    }];

    map<int64,int64> cnt_map = 5;

    repeated string names = 4 [(shark.km_field) = {
                protected_mutex: true,
                crepeat: REP_DEQUE
     }];

    message Inner {
         required string in_message = 1 [(shark.km_field) = {
                default_string: "inner"
            }];
         required int64 in_cnt = 2 [(shark.km_field) = {
                atomic: true
            }];
    };
};

message EchoResponse {
    required string message = 1 [(shark.km_field) = {
                                        default_string: "EchoResponseMsg"
                                    }];
};

service EchoService {
    rpc Echo(EchoRequest) returns (EchoResponse);
    rpc Echo2(EchoRequest) returns (EchoResponse);
    rpc Echo3(EchoRequest) returns (EchoResponse);
    rpc Echo4(EchoRequest) returns (EchoResponse);
    rpc Echo5(EchoRequest) returns (EchoResponse);
};
