syntax = "proto2";

import "shark/idl/shark_options.proto";
import "tests/base.proto";
option (shark.idl.shark_file) = {
  runtime_namespace: "my::advance"
  cpp_includes: ["turbo/container/flat_hash_map.h"]
  sk_stand: CXX_20
};

package advance.optional;

message Median {
  optional string abc = 1;
  optional base.optional.Base lower = 4;
}
message Advance {
  optional base.optional.Base base = 4;
  optional Median median = 6;
  optional string ad_name = 1 [default = "default_name"];
  optional int32 ad_age = 2;
  optional bool ad_enabled = 3 [default = true];
}