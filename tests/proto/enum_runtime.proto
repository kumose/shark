syntax = "proto3";

package shark.test;

import "shark/idl/shark_options.proto";

option (shark.idl.shark_file).enum_underlying_type = ENUM_UNDERLYING_TYPE_U16;
option (shark.idl.shark_file).enum_string_source = ENUM_STRING_SOURCE_CUSTOM_TABLE;

enum Permission {
  option (shark.idl.shark_enum).bit_flags = true;
  option (shark.idl.shark_enum).underlying_type = ENUM_UNDERLYING_TYPE_U8;
  option (shark.idl.shark_enum).string_source = ENUM_STRING_SOURCE_CUSTOM_TABLE;
  option (shark.idl.shark_enum).gen_to_string = true;
  option (shark.idl.shark_enum).gen_from_string = true;

  PERMISSION_NONE = 0;
  PERMISSION_READ = 1;
  PERMISSION_WRITE = 2;
  PERMISSION_EXECUTE = 4;
}

enum Color {
  option (shark.idl.shark_enum).string_source = ENUM_STRING_SOURCE_PROTO_REFLECTION;
  option (shark.idl.shark_enum).gen_to_string = true;
  option (shark.idl.shark_enum).gen_from_string = true;

  COLOR_UNSPECIFIED = 0;
  COLOR_RED = 1;
  COLOR_GREEN = 2;
}

message Holder {
  Color color = 1 [(shark.idl.shark_field).enum_string_source = ENUM_STRING_SOURCE_CUSTOM_TABLE];
}
