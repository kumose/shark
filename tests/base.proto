syntax = "proto2";

import "shark/idl/shark_options.proto";
option (shark.idl.shark_file) = {
  runtime_namespace: "my::base"
  cpp_includes: ["turbo/container/flat_hash_map.h"]
  sk_stand: CXX_20
};

package base.optional;

message Base {
  optional string name = 1 [default = "default_name"];
  optional int32 age = 2;
  optional bool enabled = 3 [default = true];
}