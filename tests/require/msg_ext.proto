syntax = "proto2";

import "shark/idl/shark_options.proto";
import "tests/require/msg_base.proto";

option (shark.idl.shark_file) = {
  runtime_namespace: "msgext"
  cpp_includes: ["turbo/container/flat_hash_map.h"]
  sk_stand: CXX_20
};

package msgext.pb;

message Wine {
  required string name = 1;
  optional string city   =2;
}
message Market {
  required string name = 1;
  repeated base.pb.Bear bears = 2;
  repeated base.pb.Bear required_bears = 3 [(shark.idl.shark_field) = {is_required : true}];
  optional Wine wine = 4;
  required Wine required_wine = 5;
  message Oid {
    required int32 size = 1;
    optional double data = 2;
  }
  required Oid required_oid = 10;
  optional Oid oid = 11;
  repeated Oid required_ids = 12 [(shark.idl.shark_field) = {is_required : true}];
  repeated Oid ids = 13;
}